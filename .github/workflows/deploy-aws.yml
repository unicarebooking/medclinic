name: Deploy to AWS ECS

on:
  push:
    branches: [main]

env:
  AWS_REGION: il-central-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.il-central-1.amazonaws.com
  ECS_CLUSTER: medclinic-cluster

jobs:
  # ──────────────────────────────────────────────
  # Build & Push Docker images to ECR
  # ──────────────────────────────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest

    permissions:
      contents: read

    strategy:
      matrix:
        include:
          - service: web
            context: .
            dockerfile: Dockerfile
            ecr_repo: medclinic-web
          - service: transcription
            context: ./services/transcription
            dockerfile: Dockerfile
            ecr_repo: medclinic-transcription
          - service: rag
            context: ./rag_server
            dockerfile: Dockerfile
            ecr_repo: medclinic-rag
          - service: ollama
            context: ./ollama
            dockerfile: Dockerfile
            ecr_repo: medclinic-ollama

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        env:
          IMAGE_TAG: ${{ github.sha }}
          ECR_REPO: ${{ matrix.ecr_repo }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_SUPABASE_URL=$NEXT_PUBLIC_SUPABASE_URL \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=$NEXT_PUBLIC_SUPABASE_ANON_KEY \
            -t $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPO:latest \
            -f ${{ matrix.context }}/Dockerfile \
            ${{ matrix.context }}
          docker push $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPO:latest

  # ──────────────────────────────────────────────
  # Deploy to ECS (Service Connect handles routing)
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy to ECS
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Inject ECR image tags into task definitions
        env:
          ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          for svc in medclinic-web medclinic-rag medclinic-transcription medclinic-ollama; do
            sed -i "s|ECR_IMAGE_TAG|$IMAGE_TAG|g" task-definitions/${svc}.json
            sed -i "s|AWS_ACCOUNT_ID|$ACCOUNT_ID|g" task-definitions/${svc}.json
          done

      - name: Inject EFS IDs into transcription task definition
        env:
          EFS_FILE_SYSTEM_ID: ${{ secrets.EFS_FILE_SYSTEM_ID }}
          EFS_AP_UPLOADS: ${{ secrets.EFS_AP_UPLOADS }}
          EFS_AP_OUTPUTS: ${{ secrets.EFS_AP_OUTPUTS }}
        run: |
          if [ -n "$EFS_FILE_SYSTEM_ID" ] && [ -n "$EFS_AP_UPLOADS" ] && [ -n "$EFS_AP_OUTPUTS" ]; then
            echo "EFS configured - injecting IDs..."
            sed -i "s|fs-XXXXXXXX|$EFS_FILE_SYSTEM_ID|g" task-definitions/medclinic-transcription.json
            sed -i "s|fsap-UPLOADS|$EFS_AP_UPLOADS|g" task-definitions/medclinic-transcription.json
            sed -i "s|fsap-OUTPUTS|$EFS_AP_OUTPUTS|g" task-definitions/medclinic-transcription.json
          else
            echo "EFS secrets not configured - falling back to ephemeral storage..."
            jq '.volumes = [] | .containerDefinitions[0].mountPoints = []' \
              task-definitions/medclinic-transcription.json > /tmp/transcription-td.json
            mv /tmp/transcription-td.json task-definitions/medclinic-transcription.json
          fi

      - name: Register task definitions
        run: |
          echo "Registering task definitions..."
          aws ecs register-task-definition \
            --cli-input-json file://task-definitions/medclinic-web.json \
            --no-cli-pager --query 'taskDefinition.taskDefinitionArn' --output text
          aws ecs register-task-definition \
            --cli-input-json file://task-definitions/medclinic-rag.json \
            --no-cli-pager --query 'taskDefinition.taskDefinitionArn' --output text
          aws ecs register-task-definition \
            --cli-input-json file://task-definitions/medclinic-transcription.json \
            --no-cli-pager --query 'taskDefinition.taskDefinitionArn' --output text
          aws ecs register-task-definition \
            --cli-input-json file://task-definitions/medclinic-ollama.json \
            --no-cli-pager --query 'taskDefinition.taskDefinitionArn' --output text
          echo "All task definitions registered."

      - name: Deploy all services with Service Connect
        env:
          SC_NAMESPACE: arn:aws:servicediscovery:il-central-1:${{ secrets.AWS_ACCOUNT_ID }}:namespace/ns-r5fjxgptianf2qqi
        run: |
          # Deploy transcription with Service Connect server config
          echo "Deploying medclinic-transcription..."
          TRANSCRIPTION_TASK_DEF=$(aws ecs describe-task-definition --task-definition medclinic-transcription --region $AWS_REGION --query 'taskDefinition.taskDefinitionArn' --output text)
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service medclinic-transcription \
            --task-definition "$TRANSCRIPTION_TASK_DEF" \
            --service-connect-configuration '{
              "enabled": true,
              "namespace": "'"$SC_NAMESPACE"'",
              "services": [{"portName":"transcription","discoveryName":"transcription","clientAliases":[{"port":8000,"dnsName":"transcription.medclinic.local"}]}]
            }' \
            --force-new-deployment \
            --no-cli-pager

          # Deploy rag with Service Connect server config
          echo "Deploying medclinic-rag..."
          RAG_TASK_DEF=$(aws ecs describe-task-definition --task-definition medclinic-rag --region $AWS_REGION --query 'taskDefinition.taskDefinitionArn' --output text)
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service medclinic-rag \
            --task-definition "$RAG_TASK_DEF" \
            --service-connect-configuration '{
              "enabled": true,
              "namespace": "'"$SC_NAMESPACE"'",
              "services": [{"portName":"rag","discoveryName":"rag","clientAliases":[{"port":8001,"dnsName":"rag.medclinic.local"}]}]
            }' \
            --force-new-deployment \
            --no-cli-pager

          # Deploy ollama with Service Connect server config (only if service exists)
          echo "Checking medclinic-ollama service..."
          OLLAMA_STATUS=$(aws ecs describe-services \
            --cluster $ECS_CLUSTER --services medclinic-ollama --region $AWS_REGION \
            --query 'services[?status==`ACTIVE`].serviceName' --output text)
          if [ "$OLLAMA_STATUS" = "medclinic-ollama" ]; then
            echo "Deploying medclinic-ollama..."
            OLLAMA_TASK_DEF=$(aws ecs describe-task-definition --task-definition medclinic-ollama --region $AWS_REGION --query 'taskDefinition.taskDefinitionArn' --output text)
            aws ecs update-service \
              --cluster $ECS_CLUSTER \
              --service medclinic-ollama \
              --task-definition "$OLLAMA_TASK_DEF" \
              --service-connect-configuration '{
                "enabled": true,
                "namespace": "'"$SC_NAMESPACE"'",
                "services": [{"portName":"ollama","discoveryName":"ollama","clientAliases":[{"port":11434,"dnsName":"ollama.medclinic.local"}],"timeout":{"idleTimeoutSeconds":300,"perRequestTimeoutSeconds":300}}]
              }' \
              --force-new-deployment \
              --no-cli-pager
          else
            echo "WARNING: medclinic-ollama service not found in cluster. Create it in AWS Console first."
            echo "Skipping ollama deployment - RAG server will not have AI capabilities."
          fi

          # Deploy web as Service Connect client only
          echo "Deploying medclinic-web..."
          WEB_TASK_DEF=$(aws ecs describe-task-definition --task-definition medclinic-web --region $AWS_REGION --query 'taskDefinition.taskDefinitionArn' --output text)
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service medclinic-web \
            --task-definition "$WEB_TASK_DEF" \
            --service-connect-configuration '{
              "enabled": true,
              "namespace": "'"$SC_NAMESPACE"'",
              "services": []
            }' \
            --force-new-deployment \
            --no-cli-pager

      - name: Wait for all services to stabilize
        continue-on-error: true
        timeout-minutes: 20
        run: |
          echo "Waiting for services to stabilize..."
          SERVICES="medclinic-transcription medclinic-rag medclinic-web"
          OLLAMA_STATUS=$(aws ecs describe-services \
            --cluster $ECS_CLUSTER --services medclinic-ollama --region $AWS_REGION \
            --query 'services[?status==`ACTIVE`].serviceName' --output text)
          if [ "$OLLAMA_STATUS" = "medclinic-ollama" ]; then
            SERVICES="$SERVICES medclinic-ollama"
          fi
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $SERVICES
          echo "All services are stable!"
